<!DOCTYPE html>
<html>
<head>
    <title>Linux Security Checker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <h1>Linux Security Checker</h1>
    <p class="subtitle">File-based Malware Scanner</p>

    <div class="terminal-box">

        <form method="POST" enctype="multipart/form-data">
            <label>> Upload file to scan:</label><br><br>
            <input type="file" name="file" required>
            <br><br>
            <button type="submit">Scan File</button>
        </form>

        {% if result %}
            <div class="output">
                <p>> Scan Result:</p>
                <p class="
                    {% if '✓' in result %} safe
                    {% elif '!' in result %} danger
                    {% else %} neutral
                    {% endif %}
                ">
                    {{ result }}
                </p>
            </div>
        {% endif %}

    </div>

    <div class="note">
        ⚠️ Full system scan is only available via CLI.<br>
        Run: <code>python3 security_checker.py</code>
    </div>

</div>

</body>
</html>
